<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manajemen Resep - DapurKita</title>
  <style>
    /* Reset default margin dan padding */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Body */
body {
  font-family: 'Arial', sans-serif;
  background-color: #f4f4f4;
  color: #333;
  line-height: 1.6;
}

/* Header */
header {
  background-color: #4CAF50;
  color: white;
  padding: 10px 0;
  text-align: center;
}

header h1 {
  font-size: 2rem;
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

/* Main Content */
main {
  padding: 20px;
}

/* Daftar Resep */
.resep-container {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
}

.resep-card {
  background-color: white;
  border-radius: 8px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  width: 250px;
  padding: 15px;
  text-align: center;
}

.resep-card h3 {
  font-size: 1.2rem;
  margin-bottom: 10px;
}

.resep-card p {
  font-size: 0.9rem;
  margin-bottom: 10px;
}

.resep-card button {
  background-color: #4CAF50;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
  font-size: 0.9rem;
  margin: 5px;
  padding: 5px 10px;
}

.resep-card button:hover {
  background-color: #45a049;
}

/* Form Tambah/Edit Resep */
.form-container {
  background-color: white;
  border-radius: 8px;
  box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
  max-width: 500px;
  margin: 20px auto;
  padding: 20px;
  display: none;
}

.form-container h2 {
  font-size: 1.5rem;
  margin-bottom: 20px;
}

.form-container label {
  display: block;
  font-size: 1rem;
  margin-bottom: 5px;
}

.form-container input,
.form-container textarea {
  border: 1px solid #ccc;
  border-radius: 5px;
  font-size: 1rem;
  margin-bottom: 15px;
  padding: 10px;
  width: 100%;
}

.form-container button {
  background-color: #4CAF50;
  border: none;
  border-radius: 5px;
  color: white;
  cursor: pointer;
  font-size: 1rem;
  padding: 10px 20px;
  width: 100%;
}

.form-container button:hover {
  background-color: #45a049;
}

/* Footer */
footer {
  background-color: #333;
  color: white;
  padding: 10px 0;
  text-align: center;
}

  </style>
</head>
<body>
  <header>
    <h1>🍳 Manajemen Resep</h1>
    <nav>
      <a href="index.php">Beranda</a>
      <a href="admin.php">Manajemen Resep</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Daftar Resep</h2>
      <button id="tambahBtn">Tambah Resep Baru</button>
      <div class="resep-container">
        <!-- Daftar resep akan ditampilkan di sini -->
      </div>
    </section>

    <!-- Form untuk menambahkan atau mengedit resep -->
    <div id="formContainer" class="form-container">
      <h2 id="formTitle">Tambah Resep</h2>
      <form id="resepForm" action="admin.php" method="POST">
        <input type="hidden" name="id" id="editId">
        <label for="nama_resep">Nama Resep</label>
        <input type="text" id="nama_resep" name="nama_resep" required>

        <label for="bahan">Bahan</label>
        <textarea id="bahan" name="bahan" required></textarea>

        <label for="waktu_persiapkan">Waktu Persiapan</label>
        <input type="text" id="waktu_persiapkan" name="waktu_persiapkan">

        <label for="kategori">Kategori</label>
        <input type="text" id="kategori" name="kategori" required>

        <button type="submit" name="tambah_resep">Simpan Resep</button>
      </form>
      <button id="closeBtn">Tutup</button>
    </div>
  </main>

  <footer>
    <p>&copy; 2025 DapurKita. All rights reserved.</p>
  </footer>

  <script src="inc/script.js"></script>
</body>
</html>
